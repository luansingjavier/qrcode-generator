<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator with Logo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>QR Code Generator</h1>
            <p>Create beautiful QR codes with custom logos</p>
        </header>

        <main>
            <div class="generator-section">
                <div class="input-section">
                    <div class="form-group">
                        <label for="qr-text">Enter URL or Text</label>
                        <input type="text" id="qr-text" placeholder="https://example.com or any text" value="https://example.com">
                    </div>

                    <div class="form-group">
                        <label for="logo-upload">Add Logo (Optional)</label>
                        <div class="upload-area" id="upload-area">
                            <input type="file" id="logo-upload" accept="image/*" hidden>
                            <div class="upload-content">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                                <p>Click to upload logo</p>
                                <span class="file-name" id="file-name"></span>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="logo-size">Logo Size</label>
                        <input type="range" id="logo-size" min="10" max="30" value="20">
                        <span class="range-value" id="logo-size-value">20%</span>
                    </div>

                    <div class="form-group">
                        <label for="qr-size">QR Code Size</label>
                        <input type="range" id="qr-size" min="200" max="600" value="300" step="50">
                        <span class="range-value" id="qr-size-value">300px</span>
                    </div>

                    <div class="form-group">
                        <label for="error-correction">Error Correction Level</label>
                        <select id="error-correction">
                            <option value="L">Low (L) - ~7%</option>
                            <option value="M" selected>Medium (M) - ~15%</option>
                            <option value="Q">Quartile (Q) - ~25%</option>
                            <option value="H">High (H) - ~30%</option>
                        </select>
                    </div>

                    <button id="generate-btn" class="generate-btn">Generate QR Code</button>
                </div>

                <div class="output-section">
                    <div class="qr-container">
                        <canvas id="qr-canvas"></canvas>
                        <div id="qr-placeholder" class="qr-placeholder">
                            <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <path d="M9 9h6v6H9z"></path>
                            </svg>
                            <p>Your QR code will appear here</p>
                        </div>
                    </div>
                    <button id="download-btn" class="download-btn" style="display: none;">Download QR Code</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import QRCode from 'https://esm.sh/qrcode@1.5.3';
        window.QRCode = QRCode;
        // Dispatch event when QRCode is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                window.dispatchEvent(new Event('qrcodeReady'));
            });
        } else {
            // DOM already loaded, dispatch immediately
            setTimeout(() => window.dispatchEvent(new Event('qrcodeReady')), 0);
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
